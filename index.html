<!doctype html>
<html lang="en">

<head>
	<title>I'm Not A Robot</title>
	<script>
		(function () {
			const theme = localStorage.getItem('pref_theme');
			if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
		})();
	</script>
	<link rel="icon" type="image/png" href="favicon.png">
	<link rel="stylesheet" href="css/reset.css">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/menu.css">
	<link rel="stylesheet" href="css/game.css">
	<link rel="stylesheet" href="css/cell.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Coral+Pixels&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined&display=block" rel="stylesheet">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<meta name="description" content="A memory match game featuring random images from the web for the tiles!">
</head>

<body>
	<div id="background"></div>

	<div id="splash-container" class="center">
		<div id="splash-text">I'm feeling lucky</div>
		<div id="histogram-container"></div>
	</div>
	
	<div id="menu-container"></div>

	<div id="game-container" class="shadow">
		<div id="pixels"></div>
		<div id="tooltip">
			<span class="tooltip-text">
				<span id="title">I'm not a robot</span><h1><span id="level-counter">Level  </span></h1>
			</span>
			
			<div id="tooltip-right">
				<div class="face-container">
					<img id="glasses">
					<img src="images/faces/1.png" id="face">
				</div>
				<span id="score-counter">0.0%</span>
			</div>
		</div>
		<div id="grid">
			<div id="in-game-message" class="center">0</div>
			<div id="continue-prompt" class="center">Tap to<br>Continue</div>
			<img id="splash-image" class="center" src="images/faces/7a.png">
		</div>
	</div>
	
	<div style="display: none;">
		<img src="images/faces/2.png">
		<img src="images/faces/3a.png">
		<img src="images/faces/3b.png">
		<img src="images/faces/4b.png">
		<img src="images/faces/4b.gif">
		<img src="images/faces/5b.gif">
		<img src="images/faces/7a.png">
		<img src="images/faces/7b.png">
		<img src="images/faces/break.gif">
		<img src="images/faces/special1.png">
		<img src="images/faces/special2.png">
		<img src="images/faces/special3.gif">
		<img src="images/faces/special4.gif">
		<img src="images/faces/trophy_resized.gif">
	</div>
	<script type="module" src="js/main.js"></script>
</body>

</html>
